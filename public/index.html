<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loonx Gifts PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- ПРЕМИУМ СТИЛИ (APPLE DARK & NEON GLOW) --- */
        :root { 
            --accent: #007aff; 
            --bg: #000; 
            --card: #1c1c1e; 
            --success: #34c759; 
            --error: #ff3b30; 
            --glow: 0 0 20px rgba(0, 122, 255, 0.4);
            --neon-green: 0 0 15px rgba(52, 199, 89, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; height: 100vh;
        }

        /* Анимированный фон со звездами */
        #stars-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* HEADER */
        header {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(20, 20, 22, 0.85); backdrop-filter: blur(25px);
            border-bottom: 0.5px solid #333; position: sticky; top: 0; z-index: 100;
        }
        .u-info { display: flex; align-items: center; gap: 12px; }
        .u-avatar { 
            width: 42px; height: 42px; border-radius: 50%; 
            border: 2px solid var(--success); box-shadow: var(--neon-green);
        }
        .u-meta b { font-size: 1rem; display: block; }
        .u-meta span { font-size: 0.7rem; color: var(--success); font-weight: 600; }

        .balances { text-align: right; }
        .bal-ton { color: var(--success); font-weight: 900; font-size: 1.3rem; text-shadow: var(--neon-green); }
        .bal-demo { color: #8e8e93; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

        /* LIVE NOTIFICATIONS */
        #win-alert {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(52, 199, 89, 0.95); padding: 10px 25px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 800; z-index: 1000; display: none;
            box-shadow: var(--neon-green); animation: slideIn 0.5s ease;
        }

        /* ИГРОВОЕ МЕНЮ */
        .games-nav { 
            display: flex; gap: 12px; padding: 20px; justify-content: center;
            overflow-x: auto; scrollbar-width: none;
        }
        .g-btn { 
            background: var(--card); min-width: 100px; padding: 15px; border-radius: 18px;
            border: 1px solid #333; text-align: center; transition: 0.3s;
        }
        .g-btn.active { border-color: var(--accent); box-shadow: var(--glow); background: rgba(0, 122, 255, 0.1); }
        .g-btn i { font-size: 1.6rem; display: block; margin-bottom: 6px; }
        .g-btn span { font-size: 0.85rem; font-weight: 700; color: #fff; }

        /* VIEWS */
        .view { padding: 0 20px; height: 48vh; overflow-y: auto; display: none; }
        .view.active { display: block; }

        /* CRASH VIEW */
        .history-row { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .h-node { background: #2c2c2e; padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; color: #8e8e93; border: 0.5px solid #444; }
        
        .crash-main { height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #crash-mult { font-size: 5.5rem; font-weight: 900; margin: 0; transition: 0.1s; }
        #crash-label { font-weight: 700; color: var(--accent); letter-spacing: 2px; }

        /* MINES VIEW */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 340px; margin: 0 auto; }
        .cell { 
            aspect-ratio: 1; background: #2c2c2e; border-radius: 14px; border: 1px solid #3a3a3c;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem; transition: 0.2s;
        }
        .cell.gem { background: rgba(52, 199, 89, 0.15); border-color: var(--success); color: var(--success); box-shadow: var(--neon-green); }
        .cell.bomb { background: rgba(255, 59, 48, 0.15); border-color: var(--error); }

        /* COINFLIP */
        .flip-stage { text-align: center; padding-top: 20px; }
        .coin { 
            width: 130px; height: 130px; background: linear-gradient(45deg, #ffd700, #ffae00); 
            border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; box-shadow: 0 0 40px rgba(255, 174, 0, 0.5); border: 4px solid #fff;
        }

        /* BETTING PANEL */
        .bet-footer { 
            position: fixed; bottom: 85px; width: 100%; padding: 20px;
            background: linear-gradient(transparent, #000 40%); z-index: 50;
        }
        .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        input { 
            flex: 1; background: #1c1c1e; border: 1.5px solid #333; padding: 18px; 
            border-radius: 20px; color: #fff; font-size: 1.2rem; font-weight: 700;
        }
        input:focus { border-color: var(--accent); }
        .btn-action { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; 
            background: var(--accent); color: #fff; font-weight: 800; font-size: 1.2rem;
            box-shadow: var(--glow); transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        /* SSG HOTBAR */
        .hotbar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(20, 20, 22, 0.96); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; border-top: 0.5px solid #333;
        }
        .nav-item { text-align: center; color: #8e8e93; width: 25%; padding-top: 15px; transition: 0.3s; }
        .nav-item.active { color: var(--success); }
        .nav-item i { display: block; font-size: 1.6rem; margin-bottom: 5px; }
        .nav-item span { font-size: 0.75rem; font-weight: 700; }
        .nav-item.active i { filter: drop-shadow(0 0 8px var(--success)); }

        @keyframes slideIn { from { top: -60px; } to { top: 85px; } }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>
    <div id="win-alert"></div>

    <header>
        <div class="u-info">
            <img src="" class="u-avatar" id="u-avatar">
            <div class="u-meta">
                <b id="u-name">Player</b>
                <span>● Онлайн: <span id="online-count">1</span></span>
            </div>
        </div>
        <div class="balances">
            <div class="bal-ton" id="bal-real">0.00 TON</div>
            <div class="bal-demo" id="bal-demo">DEMO: 5000</div>
        </div>
    </header>

    <div class="games-nav">
        <div class="g-btn active" onclick="setTab('crash', this)"><i>🚀</i><span>Crash</span></div>
        <div class="g-btn" onclick="setTab('mines', this)"><i>💣</i><span>Mines</span></div>
        <div class="g-btn" onclick="setTab('flip', this)"><i>🪙</i><span>Flip</span></div>
    </div>

    <main class="main-content">
        <div id="v-crash" class="view active">
            <div class="history-row" id="crash-history"></div>
            <div class="crash-main">
                <div id="crash-label">ОЖИДАНИЕ...</div>
                <h1 id="crash-mult">1.00x</h1>
            </div>
        </div>

        <div id="v-mines" class="view">
            <div class="mines-grid" id="mine-grid"></div>
        </div>

        <div id="v-flip" class="view">
            <div class="flip-stage">
                <div class="coin" id="coin-obj">🏛</div>
                <div style="display:flex; gap:15px; justify-content:center;">
                    <button class="g-btn" style="min-width:140px;" id="side-heads">ОРЁЛ</button>
                    <button class="g-btn" style="min-width:140px;" id="side-tails">РЕШКА</button>
                </div>
            </div>
        </div>

        <div id="v-wallet" class="view" style="text-align:center;">
            <div style="background:var(--card); padding:30px; border-radius:25px; margin-top:20px; border:1px solid #333;">
                <h2 style="margin-top:0;">Кошелёк TON</h2>
                <p style="color:#8e8e93; font-size:0.9rem;">Переведите TON на адрес ниже. <br>В комментарии укажите ваш ID.</p>
                <div style="background:#000; padding:15px; border-radius:15px; font-family:monospace; margin:20px 0; border:1px dashed var(--accent);" id="wallet-addr">UQBy...3N1L</div>
                <button class="btn-action" style="background:var(--success)" onclick="copyWallet()">КОПИРОВАТЬ АДРЕС</button>
            </div>
        </div>
    </main>

    <div class="bet-footer">
        <div class="input-group">
            <input type="number" id="bet-amt" value="10" placeholder="Ставка">
            <input type="number" id="mine-bombs" value="3" style="display:none; max-width:100px;" placeholder="💣">
        </div>
        <button class="btn-action" id="main-action" onclick="handlePlay()">СДЕЛАТЬ СТАВКУ</button>
    </div>

    <nav class="hotbar">
        <div class="nav-item active" onclick="setTab('crash')"><i>🎮</i><span>Игры</span></div>
        <div class="nav-item"><i>🎁</i><span>Промо</span></div>
        <div class="nav-item" onclick="setTab('wallet')"><i>💼</i><span>Кошелек</span></div>
        <div class="nav-item"><i>👤</i><span>Профиль</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io();
        let user = null;
        let curTab = 'crash';
        let isMinesRunning = false;
        let currentMinesWin = 1.0;

        // --- STARS ANIMATION ---
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = Array.from({length: 120}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: 0.2 + Math.random() * 0.5
        }));
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#fff";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        } drawStars();

        // --- CORE LOGIC ---
        window.onload = () => {
            tg.expand();
            tg.enableClosingConfirmation();
            socket.emit('auth', tg.initDataUnsafe.user || { id: 8423153067, username: "Player" });
        };

        socket.on('init', data => {
            user = data.user;
            updateUI();
            updateHistory(data.crash.history);
        });

        socket.on('crash_tick', mult => {
            if(curTab === 'crash') {
                document.getElementById('crash-mult').innerText = mult + 'x';
                document.getElementById('crash-mult').style.color = "var(--success)";
                document.getElementById('crash-label').innerText = "ЛЕТИМ...";
                document.getElementById('main-action').innerText = "ЗАБРАТЬ";
                document.getElementById('main-action').style.background = "var(--success)";
            }
        });

        socket.on('crash_end', data => {
            document.getElementById('crash-mult').innerText = data.point + 'x';
            document.getElementById('crash-mult').style.color = "var(--error)";
            document.getElementById('crash-label').innerText = "CRASH!";
            document.getElementById('main-action').innerText = "СДЕЛАТЬ СТАВКУ";
            document.getElementById('main-action').style.background = "var(--accent)";
            updateHistory(data.history);
            tg.HapticFeedback.notificationOccurred('error');
        });

        socket.on('win_notification', data => {
            const alert = document.getElementById('win-alert');
            alert.innerText = `🔥 ${data.name} выиграл ${data.win} TON!`;
            alert.style.display = "block";
            setTimeout(() => alert.style.display = "none", 3500);
        });

        function updateUI() {
            document.getElementById('u-name').innerText = user.username;
            document.getElementById('u-avatar').src = user.avatar || 'https://via.placeholder.com/42';
            document.getElementById('bal-real').innerText = user.real_balance.toFixed(2) + ' TON';
            document.getElementById('bal-demo').innerText = 'DEMO: ' + user.demo_balance.toFixed(0);
        }

        function updateHistory(h) {
            document.getElementById('crash-history').innerHTML = h.map(x => `<div class="h-node">${x}</div>`).join('');
        }

        // --- TABS & GAMES ---
        function setTab(name, el) {
            curTab = name;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + name).classList.add('active');
            document.getElementById('mine-bombs').style.display = (name === 'mines') ? 'block' : 'none';
            
            if(el) {
                document.querySelectorAll('.g-btn, .nav-item').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            if(name === 'mines') initMinesGrid();
        }

        function initMinesGrid() {
            const grid = document.getElementById('mine-grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => {
                    if(isMinesRunning) {
                        cell.classList.add('gem'); cell.innerHTML = '💎';
                        tg.HapticFeedback.impactOccurred('light');
                    }
                };
                grid.appendChild(cell);
            }
        }

        function handlePlay() {
            const amt = document.getElementById('bet-amt').value;
            tg.HapticFeedback.impactOccurred('medium');
            
            if(curTab === 'mines') {
                if(!isMinesRunning) {
                    isMinesRunning = true;
                    document.getElementById('main-action').innerText = "ЗАБРАТЬ (1.00x)";
                    document.getElementById('main-action').style.background = "var(--success)";
                } else {
                    isMinesRunning = false;
                    document.getElementById('main-action').innerText = "СДЕЛАТЬ СТАВКУ";
                    document.getElementById('main-action').style.background = "var(--accent)";
                }
            } else {
                tg.showAlert("Ставка " + amt + " TON принята!");
            }
        }

        function copyWallet() {
            const addr = document.getElementById('wallet-addr').innerText;
            navigator.clipboard.writeText(addr);
            tg.showAlert("Адрес скопирован!");
        }
    </script>
</body>
</html>
