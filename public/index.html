<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Loonx Gifts</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="loader">
        <img src="img/2799.jpg" class="waving-duck">
        <h2 class="neon-text">LOONX LOADING...</h2>
    </div>

    <header>
        <div class="logo-box">
            <img src="img/2657-Photoroom.png" width="40">
            <span id="mode-text">DEMO</span>
        </div>
        <div class="header-right">
            <div class="online-box"><div class="dot"></div><span id="online-num">0</span></div>
            <div class="balance-pill" onclick="app.toggleMode()">
                <span id="main-bal">0.00</span> <img src="img/free-icon-currency-15208522.png" width="14">
            </div>
        </div>
    </header>

    <div id="tabs">
        <section id="tab-games" class="tab active">
            <div class="game-card" onclick="app.openModal('modal-crash')">
                <img src="img/2768-Photoroom.png" width="60">
                <h3>CRASH</h3>
            </div>
            <div class="game-card" onclick="app.openModal('modal-mines')">
                <img src="img/round-black-bomb-realistic-style.png" width="60">
                <h3>MINES</h3>
            </div>
        </section>

        <section id="tab-wallet" class="tab">
            <div class="wallet-info neon-border">
                <p>REAL BALANCE</p>
                <h2 id="real-val">0.00 TON</h2>
                <button class="btn-main" onclick="alert('Минимальный вывод 5 TON')">ВЫВОД</button>
            </div>
        </section>

        <section id="tab-info" class="tab">
            <img src="img/2665.jpg" class="banner">
            <div class="links">
                <a href="#">Channel</a>
                <a href="#">Support</a>
            </div>
        </section>
    </div>

    <div id="modal-crash" class="modal hidden">
        <div class="modal-content">
            <div id="crash-info">ОЖИДАНИЕ...</div>
            <div class="crash-sky">
                <div id="mult">1.00x</div>
                <img src="img/2768-Photoroom.png" id="rocket">
            </div>
            <input type="number" id="bet-input" placeholder="0.5 - 20 TON">
            <button id="bet-btn" onclick="crash.action()" class="btn-main">СТАВКА</button>
            <button onclick="app.closeModal('modal-crash')" class="btn-close">ЗАКРЫТЬ</button>
        </div>
    </div>

    <nav class="footer-nav">
        <button onclick="app.setTab('games')">🎮</button>
        <button onclick="app.setTab('wallet')">💰</button>
        <button onclick="app.setTab('info')">🎁</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
