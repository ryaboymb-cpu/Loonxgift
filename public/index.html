<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoonxGift</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

#menu{
height:100vh;
background:linear-gradient(#4fc3f7,#81d4fa);
text-align:center;
padding-top:60px;
}

#crash{
display:none;
height:100vh;
background:black;
position:relative;
overflow:hidden;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:url('https://i.imgur.com/9a6XK8B.png');
animation:move 60s linear infinite;
opacity:0.6;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:0 1000px;}
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.crash-btn{background:#00ffcc;}
.stop-btn{background:#ff4444;color:white;}

.multiplier{
font-size:60px;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
margin-top:20px;
}

.balance{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

.dev{
margin-top:30px;
color:#444;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
<h1>LoonxGift</h1>

<button onclick="openCrash()">🚀 Crash</button>
<button onclick="alert('Разработка')">ℹ Info</button>

<div class="dev">
<h3>Другие игры:</h3>
<p>Slots — Разработка</p>
<p>Dice — Разработка</p>
<p>Wheel — Разработка</p>
</div>
</div>

<!-- CRASH -->
<div id="crash">
<div class="stars"></div>

<div class="balance">Баланс: <span id="balance">100</span> TON</div>

<div style="text-align:center; padding-top:80px;">
<h2>Crash</h2>
<p id="timer">Ставки: 15 сек</p>

<div class="multiplier" id="multi">1.00x</div>

<button class="crash-btn" onclick="bet()">Ставка 10 TON</button>
<button class="stop-btn" onclick="cashout()">Стоп</button>
<br><br>
<button onclick="backMenu()">⬅ Назад</button>
</div>
</div>

<script>
let balance=100;
let betAmount=0;
let multi=1;
let timer=15;
let crashPoint=0;
let interval;
let playing=false;

function openCrash(){
document.getElementById("menu").style.display="none";
document.getElementById("crash").style.display="block";
startRound();
}

function backMenu(){
location.reload();
}

function startRound(){
multi=1;
timer=15;
playing=false;
crashPoint = (Math.random()<0.06) ? (1+Math.random()*0.5) : (1+Math.random()*4+1);

document.getElementById("multi").innerText="1.00x";

interval=setInterval(()=>{
if(timer>0){
timer--;
document.getElementById("timer").innerText="Ставки: "+timer+" сек";
}else{
multi+=0.05;
document.getElementById("multi").innerText=multi.toFixed(2)+"x";

if(multi>=crashPoint){
explode();
}
}
},1000);
}

function bet(){
if(balance<10 || playing) return;
balance-=10;
betAmount=10;
playing=true;
updateBalance();
}

function cashout(){
if(!playing) return;
let win = betAmount * multi;
balance+=win;
updateBalance();
playing=false;
betAmount=0;
}

function explode(){
clearInterval(interval);
document.getElementById("multi").innerText="💥 BOOM";

let audio = new Audio("https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3");
audio.play();

setTimeout(startRound,4000);
}

function updateBalance(){
document.getElementById("balance").innerText=balance.toFixed(2);
}
</script>

</body>
</html>
