<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Loonx Gifts</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#070707;
color:white;
overflow:hidden;
}

/* stars */

#stars{
position:fixed;
width:100%;
height:100%;
background:url('/assets/star.png');
opacity:0.05;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{background-position:0 0}
to{background-position:1000px 1000px}
}

/* loading */

#loading{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10;
}

#coin{
width:90px;
animation:spin 2s linear infinite;
}

@keyframes spin{
0%{transform:rotateY(0)}
100%{transform:rotateY(360deg)}
}

button{
background:#141414;
border:none;
padding:12px;
margin:5px;
color:white;
border-radius:10px;
font-size:15px;
box-shadow:0 0 10px #00eaff;
}

/* header */

#top{
display:flex;
justify-content:space-between;
padding:10px;
background:#0f0f0f;
}

/* games */

.game{
display:none;
padding:20px;
text-align:center;
}

/* rocket */

#rocket{
width:140px;
animation:rocket 2s ease-in-out infinite alternate;
}

@keyframes rocket{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* hotbar */

#hotbar{
position:fixed;
bottom:0;
width:100%;
background:#0d0d0d;
display:flex;
justify-content:space-around;
padding:10px;
}

</style>

</head>

<body>

<div id="stars"></div>

<!-- loading -->

<div id="loading">

<img src="/assets/logo.png" width="120">

<img id="coin" src="/assets/coin.png">

<h2>Loonx Gifts</h2>

</div>

<!-- header -->

<div id="top">

<div>

Balance:  
<span id="balance">0</span>

<select id="mode">
<option value="demo">DEMO</option>
<option value="real">TON</option>
</select>

</div>

<div id="online">🟢 0</div>

</div>

<!-- MAIN -->

<div id="main" class="game">

<h2>Welcome</h2>

<button onclick="openGame('crash')">🚀 Crash</button>
<button onclick="openGame('mines')">💣 Mines</button>

</div>

<!-- CRASH -->

<div id="crash" class="game">

<h2>Crash</h2>

<img id="rocket" src="/assets/rocket.png">

<h1 id="multiplier">1.00x</h1>

<input id="bet" placeholder="bet">

<br>

<button onclick="startCrash()">BET</button>
<button onclick="cashout()">STOP</button>

</div>

<!-- MINES -->

<div id="mines" class="game">

<h2>Mines</h2>

<input id="mineBet" placeholder="bet">

<br>

<button onclick="startMines()">Start</button>

<div id="mineField"></div>

</div>

<!-- PROFILE -->

<div id="profile" class="game">

<h2>Profile</h2>

<p id="username">user</p>

<input id="promo" placeholder="Promo code">

<button onclick="applyPromo()">Apply</button>

</div>

<!-- INFO -->

<div id="info" class="game">

<h2 onclick="adminTap()">Info</h2>

<p>

Channel and promo  
<b>@Loonxnews</b>

<br><br>

Support  
<b>@LoonxGift_Support</b>

<br><br>

Bags  
<b>@MsgP2P</b>

</p>

</div>

<!-- ADMIN -->

<div id="adminPanel" class="game">

<h2>Admin</h2>

<button onclick="giveBalance()">Give Balance</button>

<button onclick="resetBalance()">Reset Balance</button>

</div>

<!-- HOTBAR -->

<div id="hotbar">

<button onclick="openGame('main')">🏠</button>
<button onclick="openGame('crash')">🚀</button>
<button onclick="openGame('mines')">💣</button>
<button onclick="openGame('profile')">👤</button>
<button onclick="openGame('info')">ℹ️</button>

</div>

<script>

let balance=1000

const tg = window.Telegram.WebApp
tg.expand()

if(tg.initDataUnsafe.user){
document.getElementById("username").innerText =
tg.initDataUnsafe.user.username
}

/* loading */

setTimeout(()=>{

document.getElementById("loading").style.display="none"
openGame("main")

},8000)

/* menu */

function openGame(id){

document.querySelectorAll(".game").forEach(g=>{
g.style.display="none"
})

document.getElementById(id).style.display="block"

}

/* crash */

function startCrash(){

let bet = Number(document.getElementById("bet").value)

if(bet>balance)return

balance-=bet

updateBalance()

multi=1
crashRun=true

let crashPoint = Math.random()*8+1

let interval=setInterval(()=>{

multi+=0.05

document.getElementById("multiplier").innerText=
multi.toFixed(2)+"x"

if(multi>=crashPoint){

clearInterval(interval)
crashRun=false

}

},100)

}

function cashout(){

if(!crashRun)return

let bet = Number(document.getElementById("bet").value)

balance += bet*multi

updateBalance()

crashRun=false

}
