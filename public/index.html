<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loonx Gift Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="stars-container"></div>

    <header class="header">
        <div class="user-profile" onclick="openAdmin()">
            <img src="img/avatar.png" id="tg-avatar" class="avatar">
            <div class="user-meta">
                <span id="user-name">Loonx User</span>
                <span class="online-tag">🟢 Online: <b id="online-count">0</b></span>
            </div>
        </div>
        <div id="ton-connect-btn"></div>
    </header>

    <div class="ssg-balance-card" onclick="toggleBalanceMode()">
        <div class="balance-glow"></div>
        <div class="balance-info">
            <small id="bal-label">REAL BALANCE</small>
            <h2 id="bal-amount">0.00</h2>
        </div>
        <div class="balance-icon">TON</div>
    </div>

    <main id="tab-home" class="tab active">
        <div class="games-grid">
            <div class="game-card crash" onclick="showGame('crash')">
                <div class="card-overlay">
                    <h3>CRASH</h3>
                    <p>Множитель до x100</p>
                </div>
            </div>
            <div class="game-card mines" onclick="showGame('mines')">
                <div class="card-overlay">
                    <h3>MINES</h3>
                    <p>Найди сокровища</p>
                </div>
            </div>
            <div class="game-card coinflip" onclick="showGame('coinflip')">
                <div class="card-overlay">
                    <h3>COINFLIP</h3>
                    <p>50/50 Шанс</p>
                </div>
            </div>
        </div>

        <section class="live-section">
            <div class="section-header">
                <span class="pulse"></span> LIVE BETS
            </div>
            <div id="live-bets-list" class="bets-container">
                </div>
        </section>
    </main>

    <main id="tab-promo" class="tab">
        <div class="promo-box">
            <h2>АКТИВАЦИЯ ПРОМО</h2>
            <input type="text" id="promo-input" placeholder="Введите код...">
            <button class="ssg-btn" onclick="claimPromo()">АКТИВИРОВАТЬ</button>
        </div>
    </main>

    <div id="game-screen-crash" class="game-full-screen">
        <button class="close-btn" onclick="closeGame()">✕</button>
        <div class="crash-display">
            <div id="crash-timer">10</div>
            <div id="crash-mult" style="display:none">1.00x</div>
            <canvas id="crashChart"></canvas>
        </div>
        <div class="bet-controls">
            <input type="number" id="bet-amount" placeholder="Сумма...">
            <button id="bet-btn" class="ssg-btn-win" onclick="placeCrashBet()">СТАВКА</button>
        </div>
    </div>

    <nav class="bottom-hotbar">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <svg class="ssg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>HOME</span>
        </div>
        <div class="nav-item" onclick="switchTab('wallet', this)">
            <svg class="ssg-icon" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>WALLET</span>
        </div>
        <div class="nav-item" onclick="switchTab('promo', this)">
            <svg class="ssg-icon" viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg>
            <span>PROMO</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <svg class="ssg-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>PROFILE</span>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
