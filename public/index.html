<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loonx Gifts</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --neon: #007bff; --neon-win: #00ff88; --neon-lose: #ff4444; }
        body { background: #0a0a0b; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        /* Звездное небо */
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* Лоадер (исправлен) */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a0b; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .neon-logo { font-size: 3.5em; font-weight: bold; text-shadow: 0 0 20px var(--neon); margin-bottom: 15px; }

        /* Контейнер приложения */
        #app { display: none; height: 100vh; flex-direction: column; overflow-y: auto; }

        /* Шапка */
        .header { padding: 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .balance-box { text-align: right; }
        .balance-val { color: var(--neon-win); font-weight: bold; font-size: 1.2em; }

        /* Переключатель игр */
        .game-nav { display: flex; gap: 10px; padding: 10px; justify-content: center; }
        .nav-btn { background: #1a1a1c; border: 1px solid #333; color: white; padding: 8px 20px; border-radius: 10px; cursor: pointer; }
        .nav-btn.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* CRASH AREA */
        .crash-container { padding: 20px; text-align: center; }
        .multiplier { font-size: 5em; font-weight: bold; margin: 30px 0; transition: color 0.2s; }
        .history { display: flex; gap: 8px; justify-content: center; overflow-x: auto; padding: 10px; }
        .history-item { background: #1a1a1c; padding: 4px 10px; border-radius: 5px; font-size: 0.8em; border: 1px solid #333; }

        /* MINES AREA */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 320px; margin: 20px auto; }
        .cell { aspect-ratio: 1; background: #1a1a1c; border: 1px solid #333; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.5em; cursor: pointer; }
        .cell.open { background: #2a2a2c; border-color: var(--neon); }

        /* УПРАВЛЕНИЕ СТАВКОЙ */
        .bet-controls { padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px 20px 0 0; margin-top: auto; }
        input { background: #1a1a1c; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: calc(100% - 26px); margin-bottom: 10px; font-size: 1.1em; }
        .btn-main { background: var(--neon); border: none; color: white; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.2em; box-shadow: 0 5px 15px rgba(0,123,255,0.3); }
        .btn-main:active { transform: scale(0.98); }

        /* АДМИНКА */
        #admin_panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0b; z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div id="loader">
        <div class="neon-logo">LOONX</div>
        <div style="color: #444; letter-spacing: 2px;">LOADING SESSION...</div>
    </div>

    <div id="app">
        <div class="header">
            <div>
                <div id="user_display" style="font-weight: bold;">User</div>
                <div style="font-size: 0.7em; opacity: 0.5;">ID: <span id="user_id">0</span></div>
            </div>
            <div class="balance-box">
                <div class="balance-val"><span id="bal_val">0.00</span> TON</div>
                <div style="font-size: 0.8em; opacity: 0.6;" onclick="switchMode()">Demo: <span id="demo_val">0</span></div>
            </div>
        </div>

        <div class="game-nav">
            <button class="nav-btn active" onclick="showGame('crash')">Crash</button>
            <button class="nav-btn" onclick="showGame('mines')">Mines</button>
        </div>

        <div id="game_crash" class="crash-container">
            <div id="crash_status" style="color: var(--neon); font-size: 0.9em;">Waiting for bets...</div>
            <div id="mult_display" class="multiplier">1.00x</div>
            <div id="crash_history" class="history"></div>
        </div>

        <div id="game_mines" style="display: none; padding: 20px;">
            <div class="mines-grid" id="mines_grid"></div>
        </div>

        <div class="bet-controls">
            <input type="number" id="bet_amount" value="10" step="1">
            <button id="main_action_btn" class="btn-main" onclick="handleMainAction()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div id="admin_panel">
        <button onclick="document.getElementById('admin_panel').style.display='none'">[X] Close</button>
        <h2>Admin Panel</h2>
        <div id="user_list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const socket = io();

        let currentMode = 'demo';
        let currentGame = 'crash';
        let isMinesActive = false;

        // 1. АВТОРИЗАЦИЯ И СКРЫТИЕ ЛОАДЕРА
        socket.on('connect', () => {
            const user = tg.initDataUnsafe.user || { id: 777, username: "DevLocal" };
            socket.emit('auth', user);
        });

        socket.on('user_data', (user) => {
            // ФИКС: Скрываем лоадер только когда сервер ответил данными
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            document.getElementById('user_display').innerText = user.username;
            document.getElementById('user_id').innerText = user.tgId;
            document.getElementById('bal_val').innerText = user.real_balance.toFixed(2);
            document.getElementById('demo_val').innerText = user.demo_balance.toFixed(0);
        });

        // 2. ЛОГИКА CRASH
        socket.on('crash_tick', (m) => {
            const el = document.getElementById('mult_display');
            el.innerText = m + 'x';
            el.style.color = 'white';
            document.getElementById('crash_status').innerText = "Flying...";
        });

        socket.on('crash_end', (data) => {
            const el = document.getElementById('mult_display');
            el.innerText = 'CRASH!';
            el.style.color = 'var(--neon-lose)';
            document.getElementById('crash_status').innerText = "Crashed!";
            
            // Обновляем историю
            const hist = document.getElementById('crash_history');
            hist.innerHTML = data.history.map(h => `<div class="history-item">${h}x</div>`).join('');
        });

        socket.on('crash_timer', (t) => {
            document.getElementById('mult_display').innerText = t + 's';
            document.getElementById('mult_display').style.color = 'var(--neon)';
            document.getElementById('crash_status').innerText = "Next round starts in...";
        });

        // 3. ЛОГИКА MINES
        function initMines() {
            const grid = document.getElementById('mines_grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => openCell(i);
                grid.appendChild(cell);
            }
        }
        initMines();

        function openCell(idx) {
            if(!isMinesActive) return;
            socket.emit('mines_open', idx);
        }

        socket.on('mines_started', () => {
            isMinesActive = true;
            initMines();
            document.getElementById('main_action_btn').innerText = "CASHOUT";
            document.getElementById('main_action_btn').style.background = 'var(--neon-win)';
        });

        // 4. ПЕРЕКЛЮЧЕНИЯ
        function showGame(game) {
            currentGame = game;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('game_crash').style.display = game === 'crash' ? 'block' : 'none';
            document.getElementById('game_mines').style.display = game === 'mines' ? 'block' : 'none';
        }

        function handleMainAction() {
            const amt = document.getElementById('bet_amount').value;
            if(currentGame === 'crash') {
                socket.emit('crash_bet', { amount: amt, mode: currentMode });
            } else {
                if(!isMinesActive) {
                    socket.emit('mines_start', { amount: amt, mines: 3, mode: currentMode });
                } else {
                    socket.emit('mines_cashout');
                }
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 5. ФОНОВЫЕ ЗВЕЗДЫ
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = Array(100).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2 }));
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
