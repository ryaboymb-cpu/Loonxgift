<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gifts</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        /* БАЗОВЫЕ СТИЛИ ПОД ТВОЙ СКРИНШОТ */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* --- ШАПКА --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .u-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .u-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #34c759;
        }

        .u-meta {
            display: flex;
            flex-direction: column;
        }

        .u-meta b {
            font-size: 16px;
        }

        .u-meta span {
            font-size: 10px;
            color: #34c759;
        }

        .balances {
            text-align: right;
        }

        .bal-ton {
            color: #34c759;
            font-weight: 800;
            font-size: 20px;
        }

        .bal-demo {
            color: #8e8e93;
            font-size: 10px;
        }

        /* --- ВЕРХНИЕ ВКЛАДКИ (Crash, Mines, Wallet) --- */
        .top-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
        }

        .tab-btn {
            background: #1c1c1e;
            color: #fff;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .tab-btn.active {
            border-color: #007aff;
            background: rgba(0, 122, 255, 0.1);
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-view {
            flex: 1;
            padding: 10px 20px;
            display: none;
            overflow-y: auto;
        }

        .main-view.active {
            display: block;
        }

        /* CRASH VIEW */
        .history-row {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 20px;
        }
        
        .history-pill {
            background: #1c1c1e;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #8e8e93;
            white-space: nowrap;
        }

        .crash-center {
            text-align: center;
            margin-top: 20px;
        }

        .crash-label {
            color: #007aff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .crash-mult {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .progress-bar-container {
            width: 100%;
            height: 20px;
            background: #1c1c1e;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #34c759;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* MINES VIEW */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .mine-cell {
            aspect-ratio: 1;
            background: #0a1f10;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .mine-cell.open {
            background: #1c1c1e;
        }

        /* --- НИЖНИЙ БЛОК СТАВКИ --- */
        .bet-section {
            padding: 15px 20px;
            padding-bottom: 80px; /* Отступ для хотбара */
        }

        .bet-input-wrapper {
            background: #1c1c1e;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .bet-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            padding: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-play {
            width: 100%;
            background: #007aff;
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
        }

        /* --- HOTBAR --- */
        .hotbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px 0;
            border-top: 1px solid #1c1c1e;
            z-index: 10;
        }

        .nav-item {
            text-align: center;
            color: #8e8e93;
            font-size: 10px;
            font-weight: 600;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-item i {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
        }

        /* --- ВНУТРИИГРОВАЯ АДМИНКА --- */
        #admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-title {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-stats {
            background: #1c1c1e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .admin-btn {
            width: 100%;
            background: #2c2c2e;
            color: #fff;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .admin-btn.red {
            background: #ff3b30;
            border-color: #ff3b30;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>

    <div class="content-wrapper">
        <header onclick="handleAdminTap()">
            <div class="u-info">
                <img src="https://via.placeholder.com/40" class="u-avatar" id="u-avatar">
                <div class="u-meta">
                    <b id="u-name">MsgP2P</b>
                    <span>● Online</span>
                </div>
            </div>
            <div class="balances">
                <div class="bal-ton" id="bal-real">0.00 TON</div>
                <div class="bal-demo">5000 DEMO</div>
            </div>
        </header>

        <div class="top-tabs">
            <div class="tab-btn active" onclick="switchTab('crash', this)">🚀 Crash</div>
            <div class="tab-btn" onclick="switchTab('mines', this)">💣 Mines</div>
            <div class="tab-btn" onclick="switchTab('wallet', this)">💼 Wallet</div>
        </div>

        <div id="view-crash" class="main-view active">
            <div class="history-row" id="crash-history">
                <div class="history-pill">4.08x</div>
                <div class="history-pill">3.03x</div>
                <div class="history-pill">6.08x</div>
                <div class="history-pill">5.59x</div>
                <div class="history-pill">1.50x</div>
            </div>
            
            <div class="crash-center">
                <div class="crash-label" id="crash-label">ВЗЛЕТ ЧЕРЕЗ</div>
                <div class="crash-mult" id="crash-mult">1.2</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="crash-progress"></div>
                </div>
            </div>
        </div>

        <div id="view-mines" class="main-view">
            <div class="mines-grid" id="mines-container"></div>
        </div>

        <div id="view-wallet" class="main-view">
            <h3 style="text-align:center;">Кошелек</h3>
            <p style="text-align:center; color:#8e8e93;">Подключите кошелек для игры</p>
            <button class="btn-play" style="background:#34c759;">ПОДКЛЮЧИТЬ TON</button>
        </div>

        <div class="bet-section" id="bet-section">
            <div class="bet-input-wrapper">
                <input type="number" class="bet-input" id="bet-amt" value="10">
            </div>
            <button class="btn-play" onclick="placeBet()">ПОСТАВИТЬ</button>
        </div>
    </div>

    <div class="hotbar">
        <div class="nav-item active"><i>🎮</i>Игры</div>
        <div class="nav-item"><i>🎁</i>Промо</div>
        <div class="nav-item"><i>💼</i>Кошелек</div>
        <div class="nav-item"><i>👤</i>Профиль</div>
    </div>

    <div id="admin-overlay">
        <h2 class="admin-title">🛠 АДМИН-ПАНЕЛЬ</h2>
        <div class="admin-stats">
            <span style="font-size:24px;">📊</span><br>
            Юзеров в базе: <b id="admin-users-count">10</b>
        </div>
        <button class="admin-btn" onclick="tg.showAlert('Функция создания промокода')">🎟 Создать Промо</button>
        <button class="admin-btn" onclick="tg.showAlert('Изменение RTP')">📈 RTP: 90%</button>
        <button class="admin-btn" onclick="promptGiveBalance()">👥 Выдать баланс юзеру</button>
        
        <button class="admin-btn red" onclick="closeAdmin()">Закрыть админку</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // --- 1. АНИМАЦИЯ ЗВЕЗД ---
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = Array.from({length: 100}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: 0.1 + Math.random() * 0.3
        }));
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- 2. ЛОГИКА ВКЛАДОК ---
        function switchTab(tab, element) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + tab).classList.add('active');
            element.classList.add('active');

            // Скрываем блок ставки в кошельке
            document.getElementById('bet-section').style.display = (tab === 'wallet') ? 'none' : 'block';

            if(tab === 'mines') renderMines();
        }

        // --- 3. ОТРИСОВКА МИН ---
        function renderMines() {
            const container = document.getElementById('mines-container');
            if(container.innerHTML !== '') return; // уже отрисовано
            
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.innerHTML = '💎'; // По умолчанию бриллиант (как на скрине)
                cell.onclick = () => {
                    cell.classList.add('open');
                    tg.HapticFeedback.impactOccurred('medium');
                };
                container.appendChild(cell);
            }
        }

        // --- 4. ВНУТРИИГРОВАЯ АДМИНКА ---
        let adminTaps = 0;
        function handleAdminTap() {
            adminTaps++;
            if (adminTaps >= 10) {
                adminTaps = 0;
                // Запрашиваем пароль нативным окном
                let pwd = prompt("ОБНАРУЖЕН ВХОД В АДМИНКУ.\nВведите пароль:");
                if (pwd === "8877") {
                    document.getElementById('admin-overlay').style.display = 'block';
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (pwd !== null) {
                    tg.showAlert("❌ Неверный пароль!");
                    tg.HapticFeedback.notificationOccurred('error');
                }
            }
            setTimeout(() => { adminTaps = 0; }, 5000);
        }

        function closeAdmin() {
            document.getElementById('admin-overlay').style.display = 'none';
        }

        function promptGiveBalance() {
            let user = prompt("Введите ID или Username юзера:");
            if(user) {
                let amount = prompt("Сколько TON выдать?");
                if(amount) {
                    tg.showAlert(`✅ Выдано ${amount} TON пользователю ${user}`);
                }
            }
        }

        // --- 5. СТАВКА ---
        function placeBet() {
            let val = document.getElementById('bet-amt').value;
            tg.HapticFeedback.impactOccurred('heavy');
            // Здесь отправка на твой сервер Socket.io
            console.log("Ставка:", val);
            
            // Тестовая анимация краша
            document.getElementById('crash-label').innerText = "ПОЛЕТ";
            document.getElementById('crash-label').style.color = "#34c759";
            document.getElementById('crash-progress').style.width = "100%";
        }
    </script>
</body>
</html>
