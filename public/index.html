<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gifts</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-bg" style="background-image: url('assets/images/2654.jpg');"></div>
        <div class="loader-content">
            <img src="assets/images/2676.jpg" class="pulse-logo">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p>ЗАГРУЗКА LOONX...</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="header">
            <div class="user-info">
                <img src="assets/images/2595.jpg" class="mini-ava">
                <div class="balance-container">
                    <span id="balance-amount" style="font-size: 18px; font-weight: bold;">50.00</span> 
                    <img src="assets/images/2669.jpg" class="ton-icon">
                    <div id="balance-mode" class="mode-badge demo" onclick="TMA.toggleBalanceMode()">DEMO</div>
                </div>
            </div>
            <div id="ton-connect-btn"></div>
        </header>

        <main id="content-area"></main>

        <nav class="navbar">
            <button class="nav-btn active" onclick="TMA.loadPage('main_menu', this)">ИГРЫ</button>
            <button class="nav-btn" id="info-btn">ИНФО</button>
            <button class="nav-btn" onclick="alert('Кошелек в разработке! Используй TonConnect в шапке.')">КОШЕЛЕК</button>
        </nav>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-box">
            <h3 style="color:#00e5ff;">ДОСТУП 7788</h3>
            <input type="password" id="admin-pass" placeholder="PIN-CODE">
            <button onclick="TMA.checkAdmin()">ВОЙТИ</button>
            <button onclick="TMA.toggleModal(false)" class="cancel">ОТМЕНА</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
