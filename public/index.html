<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Loonx Gifts</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>

</head>

<body>


<div id="loader">

<img src="/assets/coin.png" class="coin">

<div class="loadText">Loonx Gifts</div>

</div>


<div id="app" class="hidden">


<header>

<img src="/assets/logo.png" class="logo">

<div class="balanceBox">

<button id="demoBtn">DEMO</button>

<span id="balance">1000</span>

<button id="realBtn">REAL</button>

</div>

<div class="online">

<span class="dot"></span>

<span id="onlineCount">0</span>

</div>

</header>


<main>


<section id="games" class="screen active">

<div class="gameCard" onclick="openCrash()">

<img src="/assets/rocket.png">

<div>Rocket</div>

</div>

<div class="gameCard" onclick="openMines()">

<img src="/assets/mine.png">

<div>Mines</div>

</div>

</section>


<section id="crash" class="screen">

<div id="history"></div>

<div class="multiplier" id="multiplier">1.00x</div>

<img src="/assets/rocket.png" id="rocket">

<button class="betBtn" onclick="startCrash()">BET</button>

</section>


<section id="mines" class="screen">

<div id="mineGrid"></div>

</section>


<section id="profile" class="screen">

<h2>Profile</h2>

<div id="tgUser"></div>

<button id="ton-connect">Connect TON</button>

</section>


<section id="info" class="screen">

<p>

Channel and promo  
<a href="https://t.me/Loonxnews">@Loonxnews</a>

<br><br>

Support  
<a href="https://t.me/LoonxGift_Support">@LoonxGift_Support</a>

<br><br>

Bugs  
<a href="https://t.me/MsgP2P">@MsgP2P</a>

</p>

</section>


</main>


<nav>

<button onclick="openScreen('games')">Games</button>

<button onclick="openScreen('profile')">Profile</button>

<button onclick="openScreen('info')">Info</button>

</nav>


</div>


<script src="app.js"></script>

</body>

</html>
