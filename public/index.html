<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoonxGift Crash PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
overflow:hidden;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:-1;
}

.stars::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(white 1px, transparent 1px);
background-size:60px 60px;
animation:move 120s linear infinite;
opacity:0.25;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-1200px);}
}

#menu,#crash{display:none;height:100vh;padding:20px;}
.active{display:block;}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
}

.card{
margin-top:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(145deg,#141a2b,#1d2438);
cursor:pointer;
transition:0.3s;
}
.card:hover{transform:scale(1.05);}

canvas{
background:linear-gradient(to top,#0b0f1a,#111827);
border-radius:15px;
margin-top:10px;
}

.multiplier{
font-size:50px;
margin:10px 0;
color:#00ffcc;
text-shadow:0 0 25px #00ffcc;
}

input{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

.bet{background:#00ffcc;}
.stop{background:#ff4444;color:white;}

.history{
margin-top:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.round{
padding:5px 8px;
border-radius:8px;
font-size:13px;
font-weight:bold;
}

.green{background:#0f5132;}
.red{background:#6c1a1a;}

.timer{
font-size:18px;
color:#aaa;
}
</style>
</head>

<body>

<div class="stars"></div>

<div id="menu" class="active">
<div class="topbar">
<div>LoonxGift DEMO</div>
<div>Баланс: <span id="balance">1000.00</span> DEMO</div>
</div>

<div class="card" onclick="openCrash()">🚀 Crash PRO</div>
</div>

<div id="crash">
<div class="topbar">
<div>🚀 Crash PRO</div>
<div>Баланс: <span id="balance2">1000.00</span> DEMO</div>
</div>

<div class="multiplier" id="multi">1.00x</div>
<div class="timer" id="timer">Ожидание...</div>

<canvas id="graph" width="350" height="220"></canvas>

<br>

<input type="number" id="betInput" placeholder="Ставка" min="1" step="1">
<input type="number" id="autoCash" placeholder="Авто-кэшаут (x)" step="0.1">

<br>

<button class="bet" onclick="placeBet()">Поставить</button>
<button class="stop" onclick="cashout()">Забрать</button>
<button onclick="backMenu()">Назад</button>

<div class="history" id="history"></div>

</div>

<script>
let balance = 1000;
let betAmount = 0;
let autoCashValue = null;
let multiplier = 1;
let crashPoint;
let running = false;
let countdown = 5;
let historyList=[];
let ctx = document.getElementById("graph").getContext("2d");
let x = 0;
let animationFrame;

updateBalance();

function openCrash(){
document.getElementById("menu").classList.remove("active");
document.getElementById("crash").classList.add("active");
startCountdown();
}

function backMenu(){
document.getElementById("crash").classList.remove("active");
document.getElementById("menu").classList.add("active");
}

function startCountdown(){
countdown=5;
document.getElementById("timer").innerText="Старт через "+countdown;

let cd=setInterval(()=>{
countdown--;
document.getElementById("timer").innerText="Старт через "+countdown;
if(countdown<=0){
clearInterval(cd);
startRound();
}
},1000);
}

function placeBet(){
let input=parseFloat(document.getElementById("betInput").value);
if(input>balance || input<=0) return alert("Ошибка ставки");
betAmount=input;
balance-=betAmount;
updateBalance();

autoCashValue=parseFloat(document.getElementById("autoCash").value);
}

function startRound(){
multiplier=1;
x=0;
crashPoint=(Math.random()*4+1.5);
running=true;
ctx.clearRect(0,0,350,220);
ctx.beginPath();
ctx.moveTo(0,220);
animate();
}

function animate(){
if(!running) return;

multiplier += 0.02 + multiplier*0.003;
x+=2;

let y=220 - multiplier*22;

let gradient=ctx.createLinearGradient(0,0,0,220);
gradient.addColorStop(0,"#00ffcc");
gradient.addColorStop(1,"#003f36");

ctx.lineTo(x,y);
ctx.strokeStyle=gradient;
ctx.lineWidth=3;
ctx.shadowBlur=15;
ctx.shadowColor="#00ffcc";
ctx.stroke();

document.getElementById("multi").innerText=multiplier.toFixed(2)+"x";
document.getElementById("timer").innerText="Раунд идёт";

if(autoCashValue && multiplier>=autoCashValue){
cashout();
return;
}

if(multiplier>=crashPoint){
explode();
return;
}

animationFrame=requestAnimationFrame(animate);
}

function cashout(){
if(!running || betAmount<=0) return;
running=false;
cancelAnimationFrame(animationFrame);

let win=betAmount*multiplier;
balance+=win;
addHistory(multiplier,true);
updateBalance();
betAmount=0;
startCountdown();
}

function explode(){
running=false;
cancelAnimationFrame(animationFrame);
document.getElementById("multi").innerText="💥 CRASH";
addHistory(multiplier,false);
explosionParticles();
betAmount=0;
setTimeout(startCountdown,3000);
}

function explosionParticles(){
for(let i=0;i<50;i++){
ctx.beginPath();
ctx.arc(x+(Math.random()*60-30),
220-multiplier*22+(Math.random()*60-30),
3,0,Math.PI*2);
ctx.fillStyle="orange";
ctx.fill();
}
}

function addHistory(val,win){
historyList.unshift({v:val,w:win});
if(historyList.length>12) historyList.pop();

let container=document.getElementById("history");
container.innerHTML="";
historyList.forEach(r=>{
let d=document.createElement("div");
d.className="round "+(r.w?"green":"red");
d.innerText=r.v.toFixed(2)+"x";
container.appendChild(d);
});
}

function updateBalance(){
document.getElementById("balance").innerText=balance.toFixed(2);
document.getElementById("balance2").innerText=balance.toFixed(2);
}
</script>

</body>
</html>
