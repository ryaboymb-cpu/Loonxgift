<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Loonx Gifts</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topbar">

<div class="logo">
Loonx Gifts
</div>

<div class="balance">
Balance: <span id="balance">0</span>
</div>

</div>


<div class="history" id="history"></div>


<div class="crash-container">

<canvas id="graph"></canvas>

<div class="multiplier" id="multiplier">
1.00x
</div>

</div>


<div class="controls">

<input id="betAmount" placeholder="Bet amount">

<button class="bet-btn" onclick="placeBet()">
BET
</button>

<button class="cash-btn" onclick="cashout()">
CASHOUT
</button>

</div>


<div class="menu">

<button>
<img src="img/crash.png">
</button>

<button>
<img src="img/mines.png">
</button>

<button>
<img src="img/wheel.png">
</button>

<button>
<img src="img/profile.png">
</button>

</div>

<script src="crash.js"></script>

</body>
</html>
