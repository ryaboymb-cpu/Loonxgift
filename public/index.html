<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gifts</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="stars-container">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div id="splash-screen">
        <div class="loader-content">
            <img src="img/2657-Photoroom.png" class="pulse-logo neon-glow-blue">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p class="neon-text-blue">LOONX LOADING...</p>
        </div>
    </div>

    <header class="header">
        <div class="logo-area" onclick="app.adminClick()">
            <img src="img/2657-Photoroom.png" class="main-logo neon-glow-blue">
            <div class="app-title">
                <h1 class="neon-text-blue">Loonx Gifts</h1>
                <span id="mode-label">DEMO MODE</span>
            </div>
        </div>
        <div class="balance-container">
            <div class="balance-switch neon-box" onclick="app.toggleBalance()">
                <div id="balance-value">50.00</div>
                <img src="img/free-icon-currency-15208522.png" width="14">
                <div id="balance-type" class="type-demo">DEMO</div>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section id="tab-games" class="tab-page active">
            <h2 class="page-title neon-text-blue">Игры <br><span>Выигрывай TON прямо сейчас</span></h2>
            <div class="games-grid">
                <div class="game-card neon-box" onclick="alert('Crash в разработке')">
                    <img src="img/2768-Photoroom.png" class="game-img">
                    <div class="gi"><h3>Crash</h3><p>Множитель до небес</p></div>
                </div>
                <div class="game-card neon-box" onclick="alert('Mines в разработке')">
                    <img src="img/round-black-bomb-realistic-style.png" class="game-img">
                    <div class="gi"><h3>Mines</h3><p>Найди сокровища</p></div>
                </div>
                <div class="game-card locked">
                    <img src="img/red-3d-question-mark-transpare.png" class="game-img">
                    <div class="gi"><h3>Roulette</h3><p>Скоро открытие</p></div>
                </div>
            </div>
        </section>

        <section id="tab-wallet" class="tab-page">
            <h2 class="page-title neon-text-blue">Кошелек</h2>
            <div class="wallet-card neon-box">
                <p>ВАШ БАЛАНС (REAL)</p>
                <h2 id="real-bal-display">0.0000 TON</h2>
                <div id="ton-connect-btn"></div>
                <button class="withdraw-btn neon-box" onclick="alert('Вывод от 5 TON')">ВЫВОД СРЕДСТВ</button>
            </div>
        </section>

        <section id="tab-info" class="tab-page">
            <h2 class="page-title neon-text-blue">Инфо и Промо</h2>
            <div class="info-container neon-box">
                <img src="img/2665.jpg" class="info-banner" onerror="this.src='img/2657-Photoroom.png'">
                <div class="social-links">
                    <a href="https://t.me/Loonxnews" target="_blank" class="s-link"><i class="fa-brands fa-telegram"></i> Channel and promo</a>
                    <a href="https://t.me/LoonxGift_Support" target="_blank" class="s-link"><i class="fa-solid fa-headset"></i> Support</a>
                    <a href="https://t.me/MsgP2P" target="_blank" class="s-link"><i class="fa-solid fa-bug"></i> Bugs</a>
                </div>
                <div class="promo-section">
                    <input type="text" id="promo-input" placeholder="Введите промокод..." class="neon-box">
                    <button onclick="app.activatePromo()" class="promo-btn neon-box">АКТИВИРОВАТЬ</button>
                </div>
            </div>
        </section>

        <section id="tab-profile" class="tab-page">
            <div class="profile-header neon-box">
                <img id="user-avatar" src="img/2657-Photoroom.png">
                <div class="p-text">
                    <h3 id="user-name" class="neon-text-blue">Player</h3>
                    <p id="user-id">ID: 000000</p>
                </div>
            </div>
        </section>
    </main>

    <div id="admin-panel" class="modal hidden">
        <div class="modal-content neon-box">
            <h3>ADMIN PANEL</h3>
            <input type="text" id="new-promo" placeholder="Новый промокод">
            <button onclick="app.addPromo()">ДОБАВИТЬ</button>
            <button onclick="app.closeAdmin()" class="close-btn">ЗАКРЫТЬ</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="app.switchTab('games', this)"><i class="fa-solid fa-gamepad"></i><span>Игры</span></button>
        <button class="nav-item" onclick="app.switchTab('wallet', this)"><i class="fa-solid fa-wallet"></i><span>Кошелек</span></button>
        <button class="nav-item" onclick="app.switchTab('info', this)"><i class="fa-solid fa-gift"></i><span>Инфо</span></button>
        <button class="nav-item" onclick="app.switchTab('profile', this)"><i class="fa-solid fa-user"></i><span>Профиль</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
