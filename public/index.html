<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Loonx Gifts | Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --accent: #007aff;
            --success: #34c759;
            --error: #ff3b30;
            --glow: 0 0 20px rgba(0, 122, 255, 0.5);
        }

        body {
            margin: 0; padding: 0; background: var(--apple-bg);
            color: #fff; font-family: -apple-system, system-ui;
            overflow: hidden; height: 100vh;
        }

        /* Твой звездный фон */
        #star-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #38383a;
        }

        .avatar-box { display: flex; align-items: center; gap: 12px; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #444; }
        
        .balance-info { text-align: right; }
        .bal-ton { color: var(--success); font-weight: 800; font-size: 1.2rem; text-shadow: 0 0 10px rgba(52, 199, 89, 0.3); }
        .bal-demo { color: #8e8e93; font-size: 0.75rem; }

        /* Игровые табы */
        .game-nav { display: flex; justify-content: center; gap: 15px; padding: 15px; }
        .nav-btn {
            background: #2c2c2e; border: none; padding: 10px 25px;
            border-radius: 14px; color: #fff; font-weight: 600; transition: 0.3s;
        }
        .nav-btn.active { background: var(--accent); box-shadow: var(--glow); }

        .view { padding: 15px; height: 65vh; overflow-y: auto; display: none; }
        .view.active { display: block; }

        /* Дизайн Mines */
        .mines-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            max-width: 320px; margin: 20px auto;
        }
        .cell {
            aspect-ratio: 1; background: #2c2c2e; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; transition: 0.2s; border: 1px solid #3a3a3c;
        }
        .cell.active:active { transform: scale(0.9); }
        .cell.gem { background: rgba(52, 199, 89, 0.2); border-color: var(--success); }
        .cell.bomb { background: rgba(255, 59, 48, 0.2); border-color: var(--error); }

        /* Дизайн Crash */
        .crash-display { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #crash-num { font-size: 4.5rem; font-weight: 900; margin: 10px 0; }

        /* Ставки и Кнопки */
        .bet-box { background: var(--apple-card); padding: 20px; border-radius: 24px; border: 0.5px solid #38383a; margin-top: 10px; }
        .bet-input {
            width: 100%; background: #000; border: 1px solid #333; padding: 15px;
            border-radius: 14px; color: #fff; font-size: 1.1rem; margin-bottom: 15px; box-sizing: border-box;
        }
        .main-btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--accent); color: #fff; font-weight: 700; font-size: 1rem;
            box-shadow: var(--glow);
        }
        .main-btn:active { opacity: 0.8; transform: scale(0.98); }

        /* SSG HOTBAR */
        .hotbar {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(20, 20, 22, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding-top: 10px;
            border-top: 0.5px solid #38383a; z-index: 1000;
        }
        .bar-item { text-align: center; color: #8e8e93; font-size: 0.65rem; text-decoration: none; width: 20%; }
        .bar-item.active { color: var(--success); }
        .bar-item i { font-size: 1.6rem; display: block; margin-bottom: 4px; }

        #ton-connect-btn { margin-bottom: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <header>
        <div class="avatar-box">
            <img src="" class="avatar-img" id="user-pic">
            <div>
                <b id="user-name">Loading...</b><br>
                <span style="font-size: 0.6rem; color: var(--success);">● ONLINE</span>
            </div>
        </div>
        <div class="balance-info">
            <div class="bal-ton" id="bal-real">0.00 TON</div>
            <div class="bal-demo" id="bal-demo">Demo: 5000</div>
        </div>
    </header>

    <div class="game-nav">
        <button class="nav-btn active" onclick="switchTab('crash', this)">Crash</button>
        <button class="nav-btn" onclick="switchTab('mines', this)">Mines</button>
    </div>

    <div id="v-crash" class="view active">
        <div class="crash-display">
            <div id="crash-info" style="color: var(--accent); font-weight: 600;">Ожидание...</div>
            <div id="crash-num">1.00x</div>
        </div>
        <div class="bet-box">
            <input type="number" class="bet-input" id="crash-amt" value="10">
            <button class="main-btn" id="crash-btn" onclick="handleCrashBet()">СДЕЛАТЬ СТАВКУ</button>
        </div>
    </div>

    <div id="v-mines" class="view">
        <div class="mines-grid" id="mine-grid"></div>
        <div class="bet-box">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="number" class="bet-input" id="mine-amt" value="10" placeholder="Ставка">
                <input type="number" class="bet-input" id="mine-count" value="3" placeholder="Бомбы">
            </div>
            <button class="main-btn" id="mine-main-btn" onclick="startMinesGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="v-wallet" class="view">
        <div class="bet-box" style="text-align: center;">
            <h2 style="margin-top: 0;">Кошелек</h2>
            <div id="ton-connect-btn"></div>
            <p style="color: #8e8e93; font-size: 0.8rem;">Минимальный депозит: 0.1 TON</p>
            <button class="main-btn" style="background: var(--success); box-shadow: none;">ПОПОЛНИТЬ</button>
        </div>
    </div>

    <nav class="hotbar">
        <div class="bar-item active" onclick="switchTab('crash')"><i>🎮</i>Игры</div>
        <div class="bar-item"><i>🎁</i>Промо</div>
        <div class="bar-item" onclick="switchTab('wallet')"><i>💼</i>Кошелек</div>
        <div class="bar-item"><i>👤</i>Профиль</div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
