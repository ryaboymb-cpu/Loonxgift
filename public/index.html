<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gifts</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-bg" style="background-image: url('assets/images/2654.jpg');"></div>
        <div class="loader-content">
            <img src="assets/images/2676.jpg" class="pulse-logo">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p>ЗАГРУЗКА LOONX...</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="header">
            <div class="user-info">
                <img id="user-avatar" src="assets/images/2595.jpg" class="mini-ava">
                <div class="balance-wrap">
                    <div class="amount-row">
                        <span id="balance-amount">50.00</span>
                        <img src="assets/images/2669.jpg" class="ton-icon">
                    </div>
                    <div id="balance-mode" class="mode-badge demo" onclick="TMA.toggleBalance()">DEMO</div>
                </div>
            </div>
            <div id="ton-connect-btn"></div>
        </header>

        <main id="content-area"></main>

        <nav class="navbar">
            <button class="nav-btn active" onclick="TMA.loadPage('main_menu', this)">ИГРЫ</button>
            <button class="nav-btn" id="info-trigger">ИНФО</button>
            <button class="nav-btn" onclick="TMA.loadPage('wallet', this)">ДЕПОЗИТ</button>
        </nav>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-box">
            <h3>ADMIN ACCESS</h3>
            <input type="password" id="admin-pass" placeholder="PIN">
            <button onclick="TMA.checkAdmin()">ENTER</button>
            <button onclick="TMA.closeModal()" class="cancel">EXIT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
