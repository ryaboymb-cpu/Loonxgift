<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoonxGift</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="stars-container"></div>
    <header class="header">
        <div class="user-info" onclick="adminAccess()">
            <img src="../assets/images/duck_logo.png" class="avatar-mini" id="tg-avatar">
            <span class="username glow">LoonxGift</span>
        </div>
        <div class="balance-toggle" onclick="toggleMode()">
            <span id="h-bal">0.00</span> <small id="h-mode">DEMO</small>
        </div>
    </header>

    <main id="tab-home" class="tab active">
        <div class="game-stripe" onclick="openGame('crash')"><h3>CRASH 🚀</h3></div>
        <div class="game-stripe" onclick="openGame('mines')"><h3>MINES 💣</h3></div>
        <div class="game-stripe dev"><h3>ROULETTE 🎡</h3><span>В РАЗРАБОТКЕ</span></div>
        <div class="game-stripe dev"><h3>COINFLIP 🪙</h3><span>В РАЗРАБОТКЕ</span></div>
    </main>

    <main id="tab-wallet" class="tab">
        <div class="glass-panel text-center">
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-bottom:15px;"></div>
            <div class="wallet-balance"><span id="w-bal">0.00</span> <small>TON</small></div>
            <input type="number" id="dep-amt" placeholder="Сумма пополнения" class="neon-input">
            <button class="btn-primary" onclick="makeDeposit()" style="background:var(--green); margin-top:10px;">ДЕПОЗИТ</button>
        </div>
    </main>

    <main id="tab-profile" class="tab">
        <div class="glass-panel text-center">
            <h2 id="p-name">Player</h2>
            <div class="stats-grid">
                <div class="stat-item">Игр: <b id="s-games">0</b></div>
                <div class="stat-item">Побед: <b id="s-wins">0</b></div>
            </div>
            <button class="link-btn" style="margin-top:15px;" onclick="tg.openTelegramLink('https://t.me/msgp2p')">🎒 Bags (@msgp2p)</button>
        </div>
    </main>

    <main id="tab-promo" class="tab">
        <div class="glass-panel">
            <input type="text" id="promo-in" placeholder="ПРОМОКОД" class="neon-input">
            <button class="btn-primary" onclick="socket.emit('activate_promo', document.getElementById('promo-in').value)" style="margin-top:10px;">ОК</button>
        </div>
    </main>

    <div id="screen-crash" class="game-fullscreen">
        <button class="close-game" onclick="closeGame()">✕</button>
        <div id="crash-history" class="history-bar"></div>
        <div class="crash-arena">
            <div id="c-mult">1.00x</div>
            <div id="rocket">🚀</div>
        </div>
        <input type="number" id="c-bet" value="1.0" class="neon-input">
        <button id="c-btn" class="btn-primary" onclick="crashAction()">СТАВКА</button>
    </div>

    <div id="screen-mines" class="game-fullscreen">
        <button class="close-game" onclick="closeGame()">✕</button>
        <div id="m-status">ОЖИДАНИЕ</div>
        <div id="m-grid" class="mines-grid"></div>
        <input type="number" id="m-bet" value="1.0" class="neon-input">
        <button id="m-btn" class="btn-primary" onclick="minesAction()">ИГРАТЬ</button>
    </div>

    <nav class="hot-bar">
        <div class="nav-item active" onclick="switchTab('home', this)">Игры</div>
        <div class="nav-item" onclick="switchTab('wallet', this)">Кошелек</div>
        <div class="nav-item" onclick="switchTab('promo', this)">Промо</div>
        <div class="nav-item" onclick="switchTab('profile', this)">Профиль</div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
