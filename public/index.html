<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --neon: #00ff88; 
            --neon-blue: #00d2ff;
            --bg: #0b0b0d; 
            --card: #16161a; 
            --text: #ffffff;
            --shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            background-image: radial-gradient(circle at top right, rgba(0,255,136,0.05), transparent), 
                              radial-gradient(circle at bottom left, rgba(0,210,255,0.05), transparent);
        }

        /* Анимированные звезды */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        header { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(11, 11, 13, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .user-block { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid var(--neon); 
            box-shadow: var(--shadow);
            object-fit: cover;
            background: #222;
        }

        .bal-wrap { text-align: right; }
        .bal-val { font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: var(--shadow); }
        .bal-toggle { 
            display: inline-block; font-size: 10px; font-weight: bold; padding: 3px 10px; 
            border-radius: 20px; border: 1px solid var(--neon); margin-top: 4px;
        }

        .content { flex:1; overflow-y:auto; padding: 20px; padding-bottom: 100px; z-index: 5; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LIVE FEED */
        .live-feed { 
            background: rgba(255,255,255,0.03); border-radius: 15px; 
            padding: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .feed-item { 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 13px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .feed-user { display: flex; align-items: center; gap: 8px; }
        .feed-img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--neon); }

        /* ИГРЫ */
        .g-card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .g-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03)); }
        .g-card:active { transform: scale(0.97); background: #1c1c21; }
        .g-icon { font-size: 35px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* UI ЭЛЕМЕНТЫ */
        .btn-main { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 15px;
            background: var(--neon); color: #000; box-shadow: var(--shadow);
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }
        .input-box { 
            width: 100%; padding: 18px; background: #1a1a1e; border: 1px solid #333; 
            border-radius: 15px; color: #fff; text-align: center; font-size: 18px; font-weight: bold;
        }

        /* GRID MINES */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .cell { 
            aspect-ratio: 1; background: #25252b; border-radius: 10px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .cell.open { background: #1a1a1e; transform: scale(0.9); }

        /* HOTBAR */
        .hotbar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;
        }
        .nav-btn { color: #555; font-size: 11px; text-align: center; text-decoration: none; font-weight: bold; }
        .nav-btn.active { color: var(--neon); text-shadow: var(--shadow); }
        .nav-btn i { font-size: 24px; display: block; margin-bottom: 4px; }

        /* АДМИНКА */
        #admin-modal { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #0b0b0d; z-index: 1000; display: none; padding: 25px; overflow-y: auto; 
        }
    </style>
</head>
<body>
    <div class="stars" id="star-container"></div>

    <header id="main-header">
        <div class="user-block">
            <img src="" id="my-ava" class="avatar">
            <div>
                <div style="font-weight:900; font-size:16px; letter-spacing: 0.5px;">LOONX GIFT</div>
                <div id="user-name" style="font-size:11px; color:#888;">@loading...</div>
            </div>
        </div>
        <div class="bal-wrap">
            <div id="bal-val" class="bal-val">0.00 TON</div>
            <div class="bal-toggle" onclick="toggleBalance()" id="bal-type">REAL</div>
        </div>
    </header>

    <div class="content">
        <div id="page-games" class="page active">
            <div class="live-feed">
                <div style="font-size: 11px; color: var(--neon); font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">● LIVE ACTIVITY (7 LAST)</div>
                <div id="feed-items"></div>
            </div>
            
            <div class="g-card" onclick="openGame('crash')">
                <div class="g-icon">🚀</div>
                <div><b style="font-size:18px">CRASH</b><br><small style="color:#888">Успей забрать до взлета</small></div>
            </div>
            <div class="g-card" onclick="openGame('mines')">
                <div class="g-icon">💣</div>
                <div><b style="font-size:18px">MINES</b><br><small style="color:#888">Поле 5х5 | 5 мин</small></div>
            </div>
            <div class="g-card" onclick="openGame('coin')">
                <div class="g-icon">🪙</div>
                <div><b style="font-size:18px">COINFLIP</b><br><small style="color:#888">Шанс 50/50 | Удвоение</small></div>
            </div>
        </div>

        <div id="page-crash" class="page">
            <div style="text-align:center; padding: 50px 20px; background: rgba(255,255,255,0.02); border-radius:30px; margin-bottom:20px; border: 1px solid rgba(255,255,255,0.05);">
                <div id="crash-timer" style="color:var(--neon); font-size:14px; font-weight: bold; margin-bottom: 10px;"></div>
                <div id="crash-x" style="font-size: 64px; font-weight: 900; text-shadow: 0 0 30px rgba(0,255,136,0.3);">1.00x</div>
            </div>
            <input type="number" id="crash-input" class="input-box" placeholder="Сумма (0.5 - 20)">
            <button class="btn-main" id="crash-btn" onclick="crashAction()">Сделать ставку</button>
        </div>

        <div id="page-mines" class="page">
            <div class="grid" id="mine-grid"></div>
            <input type="number" id="mine-input" class="input-box" placeholder="Сумма ставки">
            <button class="btn-main" id="mine-btn" onclick="mineStart()">Начать игру</button>
        </div>

        <div id="page-coin" class="page">
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div id="c-side-1" class="g-card" style="flex:1; justify-content: center; margin:0; border: 2px solid transparent;" onclick="selectCoin('ОРЕЛ')">ОРЕЛ</div>
                <div id="c-side-2" class="g-card" style="flex:1; justify-content: center; margin:0; border: 2px solid transparent;" onclick="selectCoin('РЕШКА')">РЕШКА</div>
            </div>
            <input type="number" id="coin-input" class="input-box" placeholder="Сумма (0.5 - 20)">
            <button class="btn-main" onclick="coinFlipStart()">Бросить монету</button>
        </div>

        <div id="page-wallet" class="page">
            <div id="ton-connect" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>
            <div class="live-feed">
                <h3 style="margin-bottom: 15px;">Вывод средств</h3>
                <input type="number" id="with-amount" class="input-box" placeholder="Минимум 5 TON">
                <input type="text" id="with-addr" class="input-box" style="margin-top:10px" placeholder="Адрес кошелька">
                <button class="btn-main" onclick="requestWithdraw()">Создать запрос</button>
            </div>
        </div>

        <div id="page-profile" class="page">
            <div class="live-feed" id="my-history">
                <h3 style="margin-bottom: 15px;">История (10 последних)</h3>
            </div>
            <button class="btn-main" style="background:#222; color:#fff; box-shadow: none;" onclick="window.open('https://t.me/msgp2p')">🐞 BAGS / SUPPORT</button>
        </div>
    </div>

    <div class="hotbar">
        <div class="nav-btn active" onclick="nav('games', this)">🏠<br>Игры</div>
        <div class="nav-btn" onclick="nav('wallet', this)">💎<br>Кошелек</div>
        <div class="nav-btn" onclick="nav('profile', this)">👤<br>Профиль</div>
    </div>

    <div id="admin-modal">
        <h2 style="color:var(--neon); margin-bottom: 20px;">SYSTEM ADMIN</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <button class="btn-main" style="margin:0; padding:10px" onclick="admTab('db')">БАЗА</button>
            <button class="btn-main" style="margin:0; padding:10px" onclick="admTab('promo')">ПРОМО</button>
            <button class="btn-main" style="margin:0; padding:10px" onclick="admTab('with')">ВЫВОДЫ</button>
            <button class="btn-main" style="margin:0; padding:10px" onclick="admTab('rtp')">RTP</button>
        </div>
        <div id="adm-content" class="live-feed"></div>
        <button class="btn-main" style="background: #f44; color: #fff" onclick="closeAdmin()">ВЫЙТИ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
