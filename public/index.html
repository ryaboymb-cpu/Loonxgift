<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Loonx Gifts Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        /* --- ПРЕМИАЛЬНЫЙ ДИЗАЙН (Apple Dark & Neon) --- */
        :root {
            --accent: #007aff;
            --bg: #000;
            --card: #1c1c1e;
            --success: #34c759;
            --error: #ff3b30;
            --glow: 0 0 20px rgba(0, 122, 255, 0.4);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* --- ШАПКА --- */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(25px);
            border-bottom: 0.5px solid #333;
            z-index: 100;
        }

        .u-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .u-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--success);
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.4);
            object-fit: cover;
        }

        .u-meta b {
            font-size: 1rem;
            display: block;
        }

        .u-meta span {
            font-size: 0.7rem;
            color: var(--success);
            font-weight: 600;
        }

        .balances {
            text-align: right;
        }

        .bal-ton {
            color: var(--success);
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 0 0 10px rgba(52, 199, 89, 0.3);
        }

        .bal-demo {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* --- НАВИГАЦИЯ ИГР --- */
        .games-nav {
            display: flex;
            gap: 12px;
            padding: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .g-btn {
            background: var(--card);
            min-width: 100px;
            padding: 15px;
            border-radius: 18px;
            border: 1px solid #333;
            text-align: center;
            transition: 0.3s;
        }

        .g-btn.active {
            border-color: var(--accent);
            box-shadow: var(--glow);
            background: rgba(0, 122, 255, 0.1);
        }

        .g-btn span {
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* --- КОНТЕНТ --- */
        .view {
            padding: 0 20px;
            height: 50vh;
            display: none;
            overflow-y: auto;
        }

        .view.active {
            display: block;
        }

        /* CRASH */
        .history-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .h-node {
            background: #2c2c2e;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            border: 0.5px solid #444;
        }

        .crash-display {
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #crash-mult {
            font-size: 5.5rem;
            font-weight: 900;
            margin: 0;
            transition: 0.1s;
        }

        #crash-label {
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .live-bets {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #333;
            margin-top: 15px;
        }

        .bet-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 0.5px solid #333;
            font-size: 0.9rem;
        }

        /* MINES */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            background: #2c2c2e;
            border-radius: 14px;
            border: 1px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: 0.2s;
        }

        .cell.open {
            background: rgba(52, 199, 89, 0.1);
            border-color: var(--success);
        }

        /* ФУТЕР И КНОПКА СТАВКИ */
        .bet-controls {
            position: fixed;
            bottom: 95px;
            width: 100%;
            padding: 0 20px;
            background: linear-gradient(transparent, #000 50%);
        }

        .input-wrap {
            display: flex;
            background: #1c1c1e;
            border: 1.5px solid #333;
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
        }

        .btn-play {
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: var(--glow);
            transition: 0.2s;
        }

        .btn-play:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        /* НИЖНИЙ ХОТБАР */
        .hotbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(20, 20, 22, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            border-top: 0.5px solid #333;
        }

        .nav-item {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--success);
        }

        .nav-item i {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>

    <header onclick="handleAdminTap()">
        <div class="u-info">
            <img src="" class="u-avatar" id="u-avatar">
            <div class="u-meta">
                <b id="u-name">Загрузка...</b>
                <span>● Онлайн: <span id="online-count">1</span></span>
            </div>
        </div>
        <div class="balances">
            <div class="bal-ton" id="bal-real">0.00 TON</div>
            <div class="bal-demo" id="bal-demo">DEMO: 5000</div>
        </div>
    </header>

    <div class="games-nav">
        <div class="g-btn active" onclick="switchView('crash', this)">
            <span>🚀 CRASH</span>
        </div>
        <div class="g-btn" onclick="switchView('mines', this)">
            <span>💣 MINES</span>
        </div>
        <div class="g-btn" onclick="switchView('flip', this)">
            <span>🪙 FLIP</span>
        </div>
    </div>

    <main>
        <div id="v-crash" class="view active">
            <div class="history-row" id="crash-history"></div>
            <div class="crash-display">
                <div id="crash-label">ОЖИДАНИЕ...</div>
                <h1 id="crash-mult">1.00x</h1>
            </div>
            <div class="live-bets">
                <div style="font-weight:800; color:var(--text-secondary); margin-bottom:12px; font-size:0.75rem;">LIVE СТАВКИ</div>
                <div id="bets-list"></div>
            </div>
        </div>

        <div id="v-mines" class="view">
            <div class="mines-grid" id="mines-container"></div>
        </div>

        <div id="v-wallet" class="view" style="text-align:center;">
            <div style="background:var(--card); padding:30px; border-radius:25px; margin-top:20px; border:1px solid #333;">
                <h2 style="margin-top:0;">Кошелек</h2>
                <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:25px;">Подключите TON-кошелек для депозитов и выводов.</p>
                <div id="ton-connect-btn"></div>
            </div>
        </div>
    </main>

    <div class="bet-controls">
        <div class="input-wrap">
            <input type="number" id="bet-amt" value="10" placeholder="0.00">
            <div style="padding:15px; color:var(--success); font-weight:900;">TON</div>
        </div>
        <button class="btn-play" onclick="handleMainAction()">СДЕЛАТЬ СТАВКУ</button>
    </div>

    <nav class="hotbar">
        <div class="nav-item active" onclick="switchView('crash')"><i>🎮</i><span>Игры</span></div>
        <div class="nav-item"><i>🎁</i><span>Промо</span></div>
        <div class="nav-item" onclick="switchView('wallet')"><i>💼</i><span>Кошелек</span></div>
        <div class="nav-item"><i>👤</i><span>Профиль</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const socket = io();
        let currentTab = 'crash';
        let adminTaps = 0;

        // 1. ИНИЦИАЛИЗАЦИЯ TON CONNECT
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // 2. АНИМИРОВАННЫЙ ФОН (ЗВЕЗДЫ)
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = Array.from({length: 120}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: 0.3 + Math.random() * 0.5
        }));

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // 3. СКРЫТАЯ АДМИНКА
        function handleAdminTap() {
            adminTaps++;
            if(adminTaps >= 10) {
                socket.emit('trigger_admin', tg.initDataUnsafe.user?.id || 12345);
                tg.showAlert("🔐 Безопасный вход: Проверьте бота!");
                adminTaps = 0;
            }
            setTimeout(() => adminTaps = 0, 5000);
        }

        // 4. ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК
        function switchView(name, el) {
            currentTab = name;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + name).classList.add('active');

            if(el) {
                document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }

            if(name === 'mines') initMines();
        }

        // 5. ЛОГИКА MINES (ВИЗУАЛ)
        function initMines() {
            const container = document.getElementById('mines-container');
            container.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => {
                    cell.classList.add('open');
                    cell.innerHTML = '💎';
                    tg.HapticFeedback.impactOccurred('medium');
                };
                container.appendChild(cell);
            }
        }

        // 6. ОБРАБОТКА СТАВКИ
        function handleMainAction() {
            const amt = document.getElementById('bet-amt').value;
            tg.HapticFeedback.impactOccurred('heavy');

            if(currentTab === 'crash') {
                socket.emit('place_bet', { 
                    username: document.getElementById('u-name').innerText, 
                    amount: amt 
                });
            } else {
                tg.showAlert("Эта игра скоро будет доступна!");
            }
        }

        // 7. SOCKET.IO РЕПСИВЕРЫ
        window.onload = () => {
            const user = tg.initDataUnsafe.user || { id: 8423153067, username: "Player", photo_url: "" };
            socket.emit('auth', user);
            if(user.photo_url) document.getElementById('u-avatar').src = user.photo_url;
        };

        socket.on('init', data => {
            document.getElementById('u-name').innerText = data.user.username;
            document.getElementById('bal-real').innerText = data.user.real_balance.toFixed(2) + ' TON';
            document.getElementById('crash-history').innerHTML = data.crash.history.map(x => `<div class="h-node">${x}</div>`).join('');
        });

        socket.on('crash_timer', t => {
            if(currentTab === 'crash') {
                document.getElementById('crash-mult').innerText = t;
                document.getElementById('crash-mult').style.color = "#fff";
                document.getElementById('crash-label').innerText = "ВЗЛЕТ ЧЕРЕЗ";
            }
        });

        socket.on('crash_tick', m => {
            if(currentTab === 'crash') {
                document.getElementById('crash-mult').innerText = m + 'x';
                document.getElementById('crash-mult').style.color = "var(--success)";
                document.getElementById('crash-label').innerText = "ПОЛЕТ";
            }
        });

        socket.on('crash_end', data => {
            if(currentTab === 'crash') {
                document.getElementById('crash-mult').innerText = data.point + 'x';
                document.getElementById('crash-mult').style.color = "var(--error)";
                document.getElementById('crash-label').innerText = "КРАШ!";
                document.getElementById('crash-history').innerHTML = data.history.map(x => `<div class="h-node">${x}</div>`).join('');
                tg.HapticFeedback.notificationOccurred('error');
            }
        });

        socket.on('update_bets', bets => {
            document.getElementById('bets-list').innerHTML = bets.length ? 
                bets.map(b => `<div class="bet-item"><span>👤 ${b.user}</span><span>${b.amount} TON</span></div>`).join('') :
                '<div style="color:var(--text-secondary); font-size:0.8rem;">Ожидание ставок...</div>';
        });

        socket.on('bet_accepted', res => {
            tg.showAlert(res.msg);
        });

    </script>
</body>
</html>
